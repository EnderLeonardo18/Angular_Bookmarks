<div class="main-container animate-fade-in">

  <header class="hub-header">
    <div class="header-text">
      <h1 class="title">Panel <span class="accent">Admin 🛠️</span></h1>
      <p class="subtitle">Gestionando marcadores globales. Arrastra para reordenar.</p>
    </div>

    <button (click)="toggleForm()" class="btn-toggle" [class.is-active]="showForm">
      {{ showForm ? '✕ Cerrar Panel' : '＋ Nuevo Marcador Admin' }}
    </button>
  </header>

  <!-- FORMULARIO REUTILIZABLE (igual que bookmark-list) -->
  <section *ngIf="showForm" class="panel-form animate-slide-down">
    <app-bookmark-form
      [isEditMode]="isEditMode"
      [bookmarkData]="selectedBookmark"
      (save)="handleSave($event)"
      (cancel)="cancelEdit()">
    </app-bookmark-form>
  </section>

  <!-- BARRA DE FILTROS (misma clase que bookmark-list) -->
  <nav class="filter-bar">
    <button *ngFor="let cat of filterCategories"
            (click)="setFilter(cat)"
            [class.active-filter]="filterSelected === cat"
            class="filter-btn">
      {{ cat }}
    </button>
  </nav>

  <!-- BARRA DE FILTRO POR ESTADO (EMISION-PENDIENTE ETC...) -->
<div class="filter-status">
  <label class="status-label">Filtrar por estado:</label>
  <select class="status-select" [value]="filterStatus" (change)="setStatusFilter($event)">
    <option *ngFor="let status of statusOptions" [value]="status">{{ status }}</option>
  </select>
  <button (click)="resetFilters()" class="btn-reset-filters" title="Limpiar filtros">✖</button>
</div>


  <!-- BOTONES DE EXPORTACIÓN (nuevo) -->
<div class="export-actions">
  <button (click)="exportJSON()" class="btn-export json">
    <span>{{ '{' }} {{ '}' }}</span> JSON
  </button>
  <button (click)="exportTXT()" class="btn-export txt">
    <span>📄</span> TXT
  </button>
  <button (click)="printBookmarks()" class="btn-print">
    <span>🖨️</span> PDF
  </button>
</div>

  <!-- GRID DE TARJETAS -->
  <div class="cards-grid"
       cdkDropList
       (cdkDropListDropped)="drop($event)"
       cdkDropListOrientation="mixed">

    <div *ngFor="let item of filteredBookmarks"
         class="bookmark-card card-animate"
         cdkDrag>

      <div class="custom-drag-placeholder" *cdkDragPlaceholder></div>

      <div class="card-image-wrapper">
        <!-- BADGE DE PROPIETARIO (exclusivo admin) -->
        <div class="owner-badge">
          <span>👤 {{ item.user?.username || 'ID: ' + item.user_id }}</span>
        </div>

        <!-- BADGE DE ID ADMIN (opcional) -->
        <div class="admin-id-badge" *ngIf="item.id">#{{ item.id }}</div>

        <img *ngIf="item.image_preview" [src]="item.image_preview" class="img-fit" alt="preview">
        <div *ngIf="!item.image_preview" class="no-image-placeholder">No Image</div>

        <span class="category-badge" [attr.data-category]="item.category">{{ item.category }}</span>
      </div>

      <div class="card-body">
        <h3 class="card-title">{{ item.title }}</h3>
        <p class="card-text">{{ item.description || 'Sin descripción.' }}</p>
      </div>

      <div class="card-footer">
        <a [href]="item.url" target="_blank" class="visit-link">Visitar ↗</a>
        <div class="card-actions">
          <button (click)="onEdit(item)" class="action-btn edit-btn" title="Editar como Admin">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
          </button>
          <button (click)="onDelete(item.id)" class="action-btn delete-btn" title="Eliminar (Moderación)">
            <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
